    <script>(function(){
      var DATA=JSON.parse(document.getElementById('sf-data').textContent);
      var input=document.querySelector('.sf-input'), out=document.getElementById('sf-results');
      var cur=function(s){return s?('€'+s):''};
      function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
      function render(q){
        q=q.trim().toLowerCase();
        var list=q?DATA.filter(function(e){return (e.brand+' '+e.name).toLowerCase().indexOf(q)>=0}):DATA.slice(0,0);
        if(!q){out.innerHTML='<p class="sf-hint">Start typing a designer or niche fragrance to find our matching oil.</p>';return}
        if(!list.length){out.innerHTML='<p class="sf-hint">No match yet — we may not have that one. Try another, or ask us.</p>';return}
        out.innerHTML=list.slice(0,24).map(function(e){
          return '<div class="sf-card"><div class="sf-love">If you love <b>'+esc(e.brand)+' '+esc(e.name)+'</b></div>'+
            e.oils.map(function(o){return '<div class="sf-oil">'+(o.image?'<img src="'+esc(o.image)+'" alt="">':'')+
              '<div><div class="sf-oil-name">Try our <b>'+esc(o.name)+'</b></div>'+
              '<div class="sf-oil-meta">'+[o.type,o.size,cur(o.priceEUR)].filter(Boolean).map(esc).join(' · ')+'</div></div></div>'}).join('')+
            '</div>'
        }).join('')
      }
      input.addEventListener('input',function(){render(input.value)});
      var initial=decodeURIComponent((location.hash||'').replace(/^#/,''));
      if(initial){input.value=initial}
      render(input.value);
    })();</script>
